<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Criar Conta — FinanceFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: #13131f; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #1e1e2e; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px; width: 100%; max-width: 460px; }
    input { background: #2a2a3e !important; border: 1px solid rgba(255,255,255,0.1) !important; color: #e2e8f0 !important; border-radius: 10px !important; padding: 12px 16px !important; width: 100%; font-size: 14px; outline: none; box-sizing: border-box; }
    input:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99,102,241,0.15) !important; }
    label { font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
    .btn { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; padding: 13px; border-radius: 10px; font-weight: 700; font-size: 15px; width: 100%; cursor: pointer; border: none; transition: all 0.2s; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
  </style>
</head>
<body>
  <div class="card">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="font-size:36px;margin-bottom:8px;">💎</div>
      <h1 style="font-size:24px;font-weight:800;color:white;margin-bottom:4px;">Criar sua conta</h1>
      <p style="font-size:14px;color:#94a3b8;">Comece a controlar suas finanças hoje</p>
    </div>

    {% if error %}
    <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:14px;color:#f87171;">
      ⚠️ {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/auth/register">
      <div style="margin-bottom:16px;">
        <label>Nome completo</label>
        <input type="text" name="name" placeholder="João Silva" required/>
      </div>
      <div style="margin-bottom:16px;">
        <label>E-mail</label>
        <input type="email" name="email" placeholder="seu@email.com" required/>
      </div>
      <div style="margin-bottom:16px;">
        <label>Senha</label>
        <input type="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6"/>
      </div>
      <div style="margin-bottom:24px;">
        <label>Renda mensal (R$)</label>
        <input type="number" name="monthly_income" placeholder="5000.00" step="0.01" min="0"/>
      </div>
      <button type="submit" class="btn">Criar conta grátis</button>
    </form>

    <p style="text-align:center;margin-top:24px;font-size:14px;color:#94a3b8;">
      Já tem conta? <a href="/auth/login" style="color:#818cf8;font-weight:600;">Entrar</a>
    </p>
  </div>
</body>
</html>
